<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Eligibility{% endblock %} — MH Practice</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 0; background: #f5f6f8; color: #1d2733; }
    header { background: #1f4e6b; color: #fff; padding: 14px 24px; }
    header a { color: #fff; text-decoration: none; font-weight: 600; }
    main { max-width: 880px; margin: 24px auto; padding: 0 16px; }
    table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 8px; overflow: hidden; }
    th, td { text-align: left; padding: 10px 12px; border-bottom: 1px solid #e4e8ee; }
    th { background: #eef2f6; font-size: 13px; text-transform: uppercase; letter-spacing: .04em; }
    .badge { display: inline-block; padding: 3px 10px; border-radius: 12px; font-size: 13px; font-weight: 600; }
    .badge.active { background: #d8f3dc; color: #1b6b3a; }
    .badge.inactive { background: #fde2e1; color: #a32721; }
    .badge.review { background: #fff3cd; color: #8a6d00; }
    .badge.error { background: #e2e3e5; color: #41464b; }
    .badge.none { background: #e2e3e5; color: #41464b; }
    .btn { display: inline-block; padding: 8px 14px; border: 0; border-radius: 6px; background: #1f4e6b;
           color: #fff; font-size: 14px; cursor: pointer; text-decoration: none; }
    .btn.secondary { background: #6c7a89; }
    form.inline { display: inline; }
    label { display: block; margin: 12px 0 4px; font-weight: 600; }
    input[type=text], input[type=date] { width: 100%; max-width: 360px; padding: 8px; border: 1px solid #c6ccd4; border-radius: 6px; }
    .error { background: #fde2e1; color: #a32721; padding: 10px 14px; border-radius: 6px; margin-bottom: 14px; }
    .card { background: #fff; border-radius: 8px; padding: 18px 20px; margin-bottom: 18px; }
    .muted { color: #6c7a89; font-size: 13px; }
    pre { background: #eef2f6; padding: 12px; border-radius: 6px; overflow-x: auto; font-size: 12px; }
  </style>
</head>
<body>
  <header><a href="{{ url_for('mh.client_list') }}">MH Practice — Medicaid Eligibility</a></header>
  <main>{% block content %}{% endblock %}</main>
</body>
</html>
