{% extends "base.html" %}
{% block title %}Add client{% endblock %}
{% block content %}
  <div class="card">
    <h2>Add client</h2>
    <p class="muted">Saving runs an eligibility check right away.</p>
    {% if error %}<div class="error">{{ error }}</div>{% endif %}
    <form method="post">
      <label for="first_name">First name</label>
      <input type="text" id="first_name" name="first_name" required>
      <label for="last_name">Last name</label>
      <input type="text" id="last_name" name="last_name" required>
      <label for="dob">Date of birth</label>
      <input type="date" id="dob" name="dob" required>
      <label for="medicaid_id">Medicaid ID</label>
      <input type="text" id="medicaid_id" name="medicaid_id" required>
      <label for="phone">Phone (optional)</label>
      <input type="text" id="phone" name="phone">
      <p><button class="btn" type="submit">Save & check eligibility</button></p>
    </form>
  </div>
{% endblock %}
