# Render Blueprint - deploys the Moore Divine Care Smart Intake app.
# In Render: New + -> Blueprint -> pick this repo.
#
# The Starter plan + disk below keep the database and uploaded documents
# across restarts and deploys. On the free plan everything is erased on
# every restart - never use free for real clients.
services:
  - type: web
    name: mdc-smart-intake
    runtime: node
    plan: starter
    rootDir: smart-intake
    # The persistent disk is mounted when the web service starts, so schema
    # updates and seeding run from package.json prestart on the live disk.
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: DATABASE_URL
        value: file:/opt/render/project/src/smart-intake/storage/mdc.db
      - key: SESSION_SECRET
        generateValue: true
      # Staff login password. Render will ask you to type one when this
      # syncs - pick a strong password only you know. The demo password
      # stops working once this is set (takes effect on the next deploy).
      - key: ADMIN_PASSWORD
        sync: false
      # Keep demo clients (Angela Demo / Jayden Sample) out of the live site.
      - key: SEED_DEMO_DATA
        value: "false"
      - key: CLIENT_LINK_EXPIRY_DAYS
        value: "7"
      # Optional NC Tracks lookup adapter. Populate these in Render only after
      # Moore Divine Care has an approved portal/API/270-271 workflow.
      - key: NC_TRACKS_LOOKUP_URL
        sync: false
      - key: NC_TRACKS_LOOKUP_SECRET
        sync: false
    disk:
      name: mdc-data
      mountPath: /opt/render/project/src/smart-intake/storage
      sizeGB: 1
